<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FitTrack</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0A0A0C;color:#F2F0E8;min-height:100vh}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.page{display:none;flex:1;padding:60px 20px 90px}
.page.active{display:block}
h1{font-size:28px;font-weight:800;margin-bottom:16px}
p{color:#888;font-size:14px;line-height:1.6}
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#141418;border-top:1px solid #28282F;display:flex;z-index:999}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;cursor:pointer;color:#666;font-size:10px;background:none;border:none;color:#666;font-family:system-ui,sans-serif;min-height:54px;justify-content:center}
.nb.on{color:#C8F04A}
.nb svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>

<div id="app">
  <div class="page active" id="p-home">
    <h1>🏠 Accueil</h1>
    <p>Si tu vois cette page et que les onglets fonctionnent, le cache est vidé et tout est OK.</p>
  </div>
  <div class="page" id="p-workout">
    <h1>🏋️ Séance</h1>
    <p>La navigation fonctionne !</p>
  </div>
  <div class="page" id="p-run">
    <h1>🏃 Course</h1>
    <p>La navigation fonctionne !</p>
  </div>
  <div class="page" id="p-analytics">
    <h1>📊 Stats</h1>
    <p>La navigation fonctionne !</p>
  </div>
  <div class="page" id="p-coach">
    <h1>🤖 Coach</h1>
    <p>La navigation fonctionne !</p>
  </div>
  <div class="page" id="p-params">
    <h1>⚙️ Params</h1>
    <p>La navigation fonctionne !</p>
  </div>
</div>

<nav>
  <button class="nb on" onclick="go('home',this)">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Accueil
  </button>
  <button class="nb" onclick="go('workout',this)">
    <svg viewBox="0 0 24 24"><line x1="6" y1="12" x2="18" y2="12"/><line x1="3" y1="6" x2="6" y2="6"/><line x1="18" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="6" y2="18"/><line x1="18" y1="18" x2="21" y2="18"/><line x1="6" y1="6" x2="6" y2="18"/><line x1="18" y1="6" x2="18" y2="18"/></svg>
    Séance
  </button>
  <button class="nb" onclick="go('run',this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="4" r="1.5"/><path d="M9 20l1.5-6 2 2.5 2-5 1.5 4"/><path d="M6.5 13.5s1.5-1.5 3-1.5 2.5 2 4.5 2 3.5-1.5 3.5-1.5"/></svg>
    Course
  </button>
  <button class="nb" onclick="go('analytics',this)">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Stats
  </button>
  <button class="nb" onclick="go('coach',this)">
    <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    Coach
  </button>
  <button class="nb" onclick="go('params',this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    Params
  </button>
</nav>

<script>
// Kill any existing service worker and caches
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>{
    regs.forEach(r=>r.unregister());
  });
}
if('caches' in window){
  caches.keys().then(keys=>keys.forEach(k=>caches.delete(k)));
}

function go(name, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('p-'+name).classList.add('active');
  btn.classList.add('on');
}
</script>
</body>
</html>
