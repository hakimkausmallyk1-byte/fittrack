
name: Auto cache bust

on:
  push:
    branches: [main]

jobs:
  bust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject cache version
        run: |
          VERSION=$(date +%Y%m%d%H%M%S)
          sed -i "s/%%CACHE_VERSION%%/$VERSION/g" sw.js
          echo "Cache version: fittrack-$VERSION"

      - name: Commit updated sw.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sw.js
          git diff --staged --quiet || git commit -m "chore: cache bust $VERSION"
          git push
