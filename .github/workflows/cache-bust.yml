name: Auto cache bust on deploy

"on":
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate version from timestamp
        id: version
        run: echo "VERSION=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Inject version into sw.js
        run: |
          sed -i "s/%%CACHE_VERSION%%/${{ steps.version.outputs.VERSION }}/g" sw.js
          echo "Injected version: ${{ steps.version.outputs.VERSION }}"

      - name: Commit and push updated sw.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sw.js
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: cache bust ${{ steps.version.outputs.VERSION }} [skip ci]"
            git push
          fi
